<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galaga</title>
    <script>
        // Set base path for asset loading based on environment
        (function() {
            if (window.location.protocol === 'file:') {
                // Local development: no base path needed
                window.ASSET_BASE = '';
            } else if (window.location.hostname.includes('github')) {
                // GitHub Pages: use repository name as base
                window.ASSET_BASE = '/Galaga_project';
            } else {
                // Other deployment: use the pathname up to the last directory
                const path = window.location.pathname.split('/');
                path.pop(); // remove index.html
                window.ASSET_BASE = path.join('/');
            }
        })();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            gap: 16px;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-height: 70vh;
            max-width: 100vw;
            width: auto;
            height: auto;
        }

        /* ── D-Pad: positioned below canvas, not fixed ── */
        #dpad {
            display: none;
            width: 100%;
            pointer-events: none;   /* transparent except on buttons */
            padding-bottom: 16px;
        }

        @media (hover: none) and (pointer: coarse) {
            #dpad { display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 0 16px; }
        }

        .dpad-btn {
            pointer-events: all;
            background: rgba(255, 255, 255, 0.10);
            border: 2px solid rgba(255, 255, 255, 0.30);
            border-radius: 14px;
            color: #fff;
            font-family: monospace;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.06s, border-color 0.06s, opacity 0.2s;
        }

        .dpad-btn.active {
            background: rgba(255, 255, 255, 0.30);
            border-color: rgba(255, 255, 255, 0.80);
        }

        .dpad-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Movement buttons on the left */
        #dpad-move {
            display: flex;
            gap: 8px;
        }

        .btn-left, .btn-right {
            width: 72px;
            height: 72px;
            font-size: 28px;
        }

        /* Action buttons on the right: Coin and Fire */
        #dpad-actions {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            align-items: center;
        }

        .btn-fire, .btn-coin {
            width: 80px;
            height: 80px;
            font-size: 13px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border-radius: 50%;
        }

        .btn-fire {
            background: rgba(220, 80, 80, 0.20);
            border-color: rgba(220, 80, 80, 0.50);
        }

        .btn-fire.active {
            background: rgba(220, 80, 80, 0.50);
            border-color: rgba(255, 120, 120, 0.90);
        }

        .btn-coin {
            background: rgba(220, 180, 40, 0.25);
            border-color: rgba(220, 180, 40, 0.60);
        }

        .btn-coin.active {
            background: rgba(220, 180, 40, 0.55);
            border-color: rgba(255, 200, 80, 0.95);
        }
    </style>
</head>
<body>
    <canvas id="game-canvas" width="450" height="600"></canvas>

    <!-- D-pad below canvas -->
    <div id="dpad">
        <div id="dpad-move">
            <button class="dpad-btn btn-left"  id="btn-left">&#9664;</button>
            <button class="dpad-btn btn-right" id="btn-right">&#9654;</button>
        </div>
        <div id="dpad-actions">
            <button class="dpad-btn btn-coin" id="btn-coin">COIN</button>
            <button class="dpad-btn btn-fire" id="btn-fire">START</button>
        </div>
    </div>

    <script>
        // Patch HTMLImageElement to prepend ASSET_BASE to relative paths
        const imgProto = HTMLImageElement.prototype;
        const origSetAttribute = imgProto.setAttribute;
        imgProto.setAttribute = function(name, value) {
            if (name === 'src' && value && !value.startsWith('data:') && !value.startsWith('http') && !value.startsWith('/')) {
                const prefix = window.ASSET_BASE ? window.ASSET_BASE + '/' : '';
                value = prefix + value;
            }
            return origSetAttribute.call(this, name, value);
        };
        
        const origSrcDescriptor = Object.getOwnPropertyDescriptor(imgProto, 'src') || {
            get() { return this.getAttribute('src'); },
            set(v) { this.setAttribute('src', v); }
        };
        Object.defineProperty(imgProto, 'src', {
            get() { return origSrcDescriptor.get?.call(this) || this.getAttribute('src'); },
            set(value) {
                if (value && !value.startsWith('data:') && !value.startsWith('http') && !value.startsWith('/')) {
                    const prefix = window.ASSET_BASE ? window.ASSET_BASE + '/' : '';
                    value = prefix + value;
                }
                origSrcDescriptor.set?.call(this, value) || this.setAttribute('src', value);
            },
            configurable: true
        });
    </script>

    <script>
        // Load galaga.js with the correct asset base path
        // Use a timestamp to bust cache and ensure fresh loads on GitHub Pages
        const loadGameScript = () => {
            if (window.main) return; // Already loaded
            const scriptEl = document.createElement('script');
            const assetBase = window.ASSET_BASE ? window.ASSET_BASE + '/' : '';
            // Add cache-buster timestamp to prevent browser caching issues
            const timestamp = new Date().getTime();
            scriptEl.src = assetBase + 'web/js/galaga.js?v=' + timestamp;
            scriptEl.onerror = () => {
                console.error('Failed to load galaga.js, retrying in 500ms...');
                setTimeout(loadGameScript, 500);
            };
            scriptEl.onload = () => {
                console.log('galaga.js loaded successfully');
                // Trigger startGame in case it's already waiting
                if (window.startGameWaitLoop) {
                    window.startGameWaitLoop();
                }
            };
            document.head.appendChild(scriptEl);
        };
        loadGameScript();
        
        // Also try loading on visibility change (fixes hidden tab issue)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && !window.main) {
                console.log('Page became visible and main() not loaded, retrying...');
                loadGameScript();
            }
        });
    </script>
    <script>
        // ── Debugging & Diagnostics ────────────────────────────────────
        window.galagaDebug = {
            logs: [],
            addLog: function(msg) {
                const ts = new Date().toLocaleTimeString();
                const entry = `[${ts}] ${msg}`;
                this.logs.push(entry);
                console.log(entry);
            }
        };

        window.addEventListener("error", function(e) {
            window.galagaDebug.addLog(`ERROR: ${e.message}`);
            if (e.error && e.error.javaException) {
                try {
                    var je = e.error.javaException;
                    var msg = je.toString ? je.toString() : String(je);
                    window.galagaDebug.addLog(`Java exception: ${msg}`);
                    if (je.getStackTrace) {
                        var frames = je.getStackTrace();
                        for (var i = 0; i < frames.length; i++) {
                            var f = frames[i];
                            window.galagaDebug.addLog(`  at ${f.getClassName()}.${f.getMethodName()}(${f.getFileName()}:${f.getLineNumber()})`);
                        }
                    }
                } catch(ex) { console.error("Exception logging error:", ex); }
            }
        });

        window.addEventListener("unhandledrejection", function(e) {
            window.galagaDebug.addLog(`Unhandled Promise Rejection: ${e.reason}`);
        });

        // Test image loading
        window.galagaDebug.addLog("Starting Galaga...");
        window.galagaDebug.testImages = function() {
            const paths = [
                "web/js/sprites/sprites.png",
                "web/js/sprites/initial_screen_sprites.png",
                "web/js/sprites/coin_inserted_screen.png",
                "web/js/sprites/numbers.png",
                "web/js/sprites/loading_screen_sprites.png",
                "web/js/sprites/background-frame-0.png",
                "web/js/sprites/background-frame-1.png",
                "web/js/sprites/background-frame-2.png",
                "web/js/sprites/background-frame-3.png"
            ];
            paths.forEach(path => {
                const img = new Image();
                img.onload = () => window.galagaDebug.addLog(`✓ Image loaded: ${path}`);
                img.onerror = () => window.galagaDebug.addLog(`✗ Image failed: ${path}`);
                img.src = path;
            });
        };

        // ── Java exception debug handler ──────────────────────────────────
        window.addEventListener("error", function(e) {
            if (e.error && e.error.javaException) {
                try {
                    var je = e.error.javaException;
                    var msg = je.toString ? je.toString() : String(je);
                    console.error("Java exception: " + msg);
                    if (je.getStackTrace) {
                        var frames = je.getStackTrace();
                        for (var i = 0; i < frames.length; i++) {
                            var f = frames[i];
                            console.error("  at " + f.getClassName() + "." + f.getMethodName()
                                + " (" + f.getFileName() + ":" + f.getLineNumber() + ")");
                        }
                    }
                } catch(ex) { /* ignore */ }
            }
        });

        // ── D-Pad wiring ──────────────────────────────────────────────────
        function fireKey(type, code) {
            document.dispatchEvent(new KeyboardEvent(type, { code: code, bubbles: true }));
        }

        function wireHold(id, downCode, upCode) {
            var el = document.getElementById(id);
            function press(e)   { e.preventDefault(); el.classList.add("active");    fireKey("keydown", downCode); }
            function release(e) { e.preventDefault(); el.classList.remove("active"); if (upCode) fireKey("keyup", upCode); }
            el.addEventListener("touchstart",  press,   { passive: false });
            el.addEventListener("touchend",    release, { passive: false });
            el.addEventListener("touchcancel", release, { passive: false });
            el.addEventListener("mousedown",  press);
            el.addEventListener("mouseup",    release);
            el.addEventListener("mouseleave", release);
        }

        function wireTap(id, code) {
            var el = document.getElementById(id);
            function press(e) {
                e.preventDefault();
                el.classList.add("active");
                fireKey("keydown", code);
                setTimeout(function() { el.classList.remove("active"); }, 120);
            }
            el.addEventListener("touchstart", press, { passive: false });
            el.addEventListener("mousedown",  press);
        }

        // Wire up buttons once DOM is ready
        const wireButtons = () => {
            const left = document.getElementById("btn-left");
            const right = document.getElementById("btn-right");
            const fire = document.getElementById("btn-fire");
            const coin = document.getElementById("btn-coin");
            
            if (!left || !right || !fire || !coin) {
                setTimeout(wireButtons, 50);
                return;
            }
            
            wireHold("btn-left",  "ArrowLeft",  "ArrowLeft");
            wireHold("btn-right", "ArrowRight", "ArrowRight");
            wireTap ("btn-fire",  "Space");
            wireTap ("btn-coin",  "KeyC");
        };
        wireButtons();

        // ── Fire / Start label ────────────────────────────────────────────
        var fireBtn = document.getElementById("btn-fire");
        var coinBtn = document.getElementById("btn-coin");
        var lastPlayingState = false;
        
        (function updateUIState() {
            // Update fire button label
            fireBtn.textContent = window.galagaPlaying ? "FIRE" : "START";
            
            // Hide/show coin button based on game state
            const isPlaying = window.galagaPlaying || false;
            if (isPlaying !== lastPlayingState) {
                lastPlayingState = isPlaying;
                if (isPlaying) {
                    coinBtn.classList.add("hidden");
                } else {
                    coinBtn.classList.remove("hidden");
                }
            }
            
            requestAnimationFrame(updateUIState);
        })();

        // ── Start ─────────────────────────────────────────────────────────
        let startGameAttempts = 0;
        const MAX_START_ATTEMPTS = 100; // 10 seconds with 100ms delays
        
        function startGame() {
            startGameAttempts++;
            
            if (typeof main !== 'function') {
                if (startGameAttempts % 10 === 0) { // Log every 10 attempts
                    window.galagaDebug.addLog(`Waiting for main()... (attempt ${startGameAttempts})`);
                }
                
                if (startGameAttempts >= MAX_START_ATTEMPTS) {
                    window.galagaDebug.addLog("ERROR: main() failed to load after 10 seconds");
                    // Try reloading the script
                    loadGameScript();
                    startGameAttempts = 0;
                    setTimeout(startGame, 500);
                    return;
                }
                
                setTimeout(startGame, 100);
                return;
            }
            
            window.galagaDebug.addLog("Checking Galaga initialization...");
            window.galagaDebug.addLog(`main() function exists: true`);
            window.galagaDebug.addLog(`window.galagaPlaying exists: ${typeof window.galagaPlaying !== 'undefined'}`);
            window.galagaDebug.addLog(`Canvas element: ${document.getElementById('game-canvas') ? 'Found' : 'NOT FOUND'}`);
            
            // Test image loading
            window.galagaDebug.testImages();
            
            window.galagaDebug.addLog("Starting main()...");
            main();
        }
        
        // Export function for script.onload to call
        window.startGameWaitLoop = startGame;
        
        // Start after a brief delay to ensure DOM is ready
        setTimeout(startGame, 100);
    </script>
</body>
</html>
